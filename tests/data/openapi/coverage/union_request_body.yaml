openapi: 3.0.0
info:
  title: Union Request Body
  version: 1.0.0
paths:
  /payload:
    post:
      operationId: createPayload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/TypeA'
                - $ref: '#/components/schemas/TypeB'
      responses:
        '204':
          description: No content
components:
  schemas:
    TypeA:
      type: object
      required:
        - a
      properties:
        a:
          type: string
    TypeB:
      type: object
      required:
        - b
      properties:
        b:
          type: string
